<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">

    <link rel="stylesheet" href="styles.css">

<body>
    <header class="site-header">
        <nav class="top-nav">
            <div class="nav-left">

    <div class="hero-image">

    <footer class="site-footer">
